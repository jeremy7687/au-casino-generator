name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate JSON-LD schemas
        run: |
          python3 validate_schema.py

      - name: Deploy
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Change "au-casino" to your Cloudflare Pages project name
          command: pages deploy generated --project-name=au-casino

      - name: Print deployment URL
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
        run: echo "Deployed to $DEPLOYMENT_URL"

      - name: Submit to Google Indexing API
        env:
          GOOGLE_INDEXING_KEY: ${{ secrets.GOOGLE_INDEXING_KEY }}
        run: |
          pip install google-auth google-api-python-client -q
          echo "$GOOGLE_INDEXING_KEY" > google-indexing-key.json
          # Submit only HTML pages that changed in this push (not all pages)
          DOMAIN=$(python3 -c "import json; print(json.load(open('config.json'))['site']['domain'])")
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'generated/*.html' 'generated/**/*.html' 2>/dev/null || true)
          if [ -n "$CHANGED" ]; then
            URLS=""
            while IFS= read -r f; do
              [ -z "$f" ] && continue
              rel="${f#generated/}"
              url="${DOMAIN}/${rel%.html}/"
              URLS="$URLS $url"
            done <<< "$CHANGED"
            python3 indexing.py $URLS || true
          else
            echo "No HTML pages changed — skipping indexing submission"
          fi
          rm -f google-indexing-key.json

      - name: Submit citations to Gigalinks
        env:
          GIGALINKS_API_TOKEN: ${{ secrets.GIGALINKS_API_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 citations.py || true

      - name: Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          python3 -c "
          import os, urllib.request, json
          token = os.environ.get('TELEGRAM_BOT_TOKEN')
          chat  = os.environ.get('TELEGRAM_CHAT_ID')
          url   = os.environ.get('DEPLOYMENT_URL', 'https://ssusa.co')
          msg   = os.environ.get('COMMIT_MSG', '')[:80]
          text  = f'🚀 <b>Site Deployed</b>\n📦 {msg}\n🌐 https://ssusa.co\n🔗 {url}'
          payload = json.dumps({'chat_id': chat, 'text': text, 'parse_mode': 'HTML'}).encode()
          req = urllib.request.Request(f'https://api.telegram.org/bot{token}/sendMessage', data=payload, headers={'Content-Type':'application/json'}, method='POST')
          urllib.request.urlopen(req, timeout=10)
          " || true
