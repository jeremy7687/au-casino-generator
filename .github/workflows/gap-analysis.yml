name: Weekly Gap Analysis

# Runs every Monday at 6:00 AM UTC (2:00 PM MYT)
on:
  schedule:
    - cron: '0 6 * * 1'

  workflow_dispatch:
    inputs:
      limit:
        description: 'Max keywords to analyse'
        required: false
        type: number
        default: 5

jobs:
  gap-analysis:
    runs-on: ubuntu-latest
    name: Discover content gaps and add to queue
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install anthropic PyGithub beautifulsoup4

      - name: Run gap analysis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATAFORSEO_LOGIN: ${{ secrets.DATAFORSEO_LOGIN }}
          DATAFORSEO_PASSWORD: ${{ secrets.DATAFORSEO_PASSWORD }}
        run: |
          python3 gap_analysis.py --limit ${{ inputs.limit || 5 }}

      - name: Commit updated queue and keyword pool
        run: |
          git config user.name "Gap Analysis Bot"
          git config user.email "gap-analysis@users.noreply.github.com"
          git add content-queue.json
          git diff --staged --quiet || git commit -m "gap-analysis: weekly run — $(date +%Y-%m-%d)"
          git push
